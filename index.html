<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Color Master - 시작하기</title>
  <!-- 분리한 CSS 파일들을 연결합니다 -->
  <link rel="stylesheet" href="common.css">
  <link rel="stylesheet" href="auth.css"> 
</head>
<body>

<div class="container">
  
  <!-- 0. 메인 화면 -->
  <div id="main-section">
    <div class="main-title-box">
      <h1>Color Master</h1>
    </div>
    <div class="main-btn-group">
      <button id="nav-to-login">로그인</button>
      <button id="nav-to-guest">게스트로그인</button>
    </div>
    <span class="main-signup-link" id="nav-to-signup">회원가입</span>
  </div>

  <!-- 1. 일반 로그인 화면 -->
  <div id="login-section" class="hidden">
    <h2 style="text-align: center;">로그인</h2>
    <div class="input-group">
      <label>아이디</label>
      <input type="text" id="login-id" placeholder="아이디 입력">
    </div>
    <div class="input-group">
      <label>비밀번호</label>
      <input type="password" id="login-password" placeholder="비밀번호 입력">
    </div>
    <button id="btn-login" class="primary-btn">로그인</button>
    <button id="btn-google-login" class="primary-btn btn-google">구글로 시작하기</button>
    <span class="toggle-link nav-to-main">메인으로 돌아가기</span>
  </div>

  <!-- 2. 게스트 로그인 화면 -->
  <div id="guest-login-section" class="hidden">
    <h2 style="text-align: center;">게스트 로그인</h2>
    <p style="font-size: 13px; color: #666; text-align: center;">빠르게 게임을 시작할 닉네임을 입력하세요.</p>
    <div class="input-group">
      <label>닉네임</label>
      <input type="text" id="guest-nickname" placeholder="사용할 닉네임 입력">
    </div>
    <button id="btn-guest-login-submit" class="primary-btn">게스트로 시작</button>
    <span class="toggle-link nav-to-main">메인으로 돌아가기</span>
  </div>

  <!-- 3. 일반 이메일 회원가입 화면 -->
  <div id="signup-section" class="hidden">
    <h2 style="text-align: center;">이메일 회원가입</h2>
    <div class="input-group">
      <label>아이디</label>
      <input type="text" id="signup-id" placeholder="사용할 아이디">
      <button class="btn-secondary" id="btn-check-id">중복확인</button>
      <span id="id-status" style="font-size:12px; color:red;"></span>
    </div>
    <div class="input-group">
      <label>닉네임</label>
      <input type="text" id="signup-nickname" placeholder="사용할 닉네임">
      <button class="btn-secondary" id="btn-check-nickname">중복확인</button>
      <span id="nickname-status" style="font-size:12px; color:red;"></span>
    </div>
    <div class="input-group">
      <label>이메일</label>
      <input type="email" id="signup-email" placeholder="이메일 입력">
    </div>
    <div class="input-group">
      <label>비밀번호</label>
      <input type="password" id="signup-password" placeholder="8~12자 (영문, 숫자, 특수문자)">
    </div>
    <div class="input-group">
      <label>프로필 사진 (선택)</label>
      <input type="file" id="signup-profile-file" accept="image/*">
    </div>
    <button id="btn-signup" class="primary-btn">회원가입 완료</button>
    <span class="toggle-link nav-to-main">메인으로 돌아가기</span>
  </div>

  <!-- 4. 구글 신규 유저 추가 정보 입력 화면 -->
  <div id="google-signup-section" class="hidden">
    <h2 style="text-align: center;">구글 회원가입 추가 정보</h2>
    <p style="font-size: 13px; color: #666; text-align: center;">구글 연동이 완료되었습니다. 게임 정보를 입력해주세요.</p>
    <div class="input-group">
      <label>이메일</label>
      <input type="email" id="g-signup-email" disabled>
    </div>
    <div class="input-group">
      <label>아이디</label>
      <input type="text" id="g-signup-id" placeholder="사용할 아이디">
      <button class="btn-secondary" id="btn-g-check-id">중복확인</button>
      <span id="g-id-status" style="font-size:12px; color:red;"></span>
    </div>
    <div class="input-group">
      <label>닉네임</label>
      <input type="text" id="g-signup-nickname" placeholder="사용할 닉네임">
      <button class="btn-secondary" id="btn-g-check-nickname">중복확인</button>
      <span id="g-nickname-status" style="font-size:12px; color:red;"></span>
    </div>
    <div class="input-group">
      <label>프로필 사진 변경 (선택)</label>
      <input type="file" id="g-signup-profile-file" accept="image/*">
    </div>
    <button id="btn-g-signup-complete" class="primary-btn">구글 가입 완료</button>
    <span class="toggle-link nav-to-main">메인으로 돌아가기</span>
  </div>

</div>

<!-- 자바스크립트 연동 -->
<script type="module">
  import { 
    signUpWithEmail, 
    login, 
    loginWithGoogle, 
    completeGoogleSignUp, 
    checkIdDuplicate, 
    checkNicknameDuplicate,
    loginAsGuest
  } from './login.js';

  // 상태 관리 변수 (중복 확인 통과 여부)
  let isIdValid = false;
  let isNicknameValid = false;

  // 구글 신규 가입 시 임시 저장용 데이터
  let tempGoogleData = null;

  // ---------------------------------------------------
  // 화면 내부 전환 (SPA 방식)
  // ---------------------------------------------------
  const showSection = (sectionId) => {
    document.querySelectorAll('.container > div').forEach(div => div.classList.add('hidden'));
    document.getElementById(sectionId).classList.remove('hidden');
  };

  document.getElementById('nav-to-login').addEventListener('click', () => showSection('login-section'));
  document.getElementById('nav-to-guest').addEventListener('click', () => showSection('guest-login-section'));
  document.getElementById('nav-to-signup').addEventListener('click', () => showSection('signup-section'));

  document.querySelectorAll('.nav-to-main').forEach(btn => {
    btn.addEventListener('click', () => showSection('main-section'));
  });

  // ---------------------------------------------------
  // 로그인/회원가입 기능 실행 및 화면 이동 (lobby.html 연결)
  // ---------------------------------------------------
  
  // 1. 게스트 로그인
  document.getElementById('btn-guest-login-submit').addEventListener('click', async () => {
    const guestNick = document.getElementById('guest-nickname').value;
    if (!guestNick) return alert("게스트 닉네임을 입력하세요.");
    
    const isSuccess = await loginAsGuest(guestNick);
    if (isSuccess) {
      alert(`${guestNick}님 환영합니다!`);
      window.location.href = "lobby.html"; // 로그인 성공 시 로비로 이동
    }
  });

  // 2. 일반 로그인
  document.getElementById('btn-login').addEventListener('click', async () => {
    const user_id = document.getElementById('login-id').value;
    const pw = document.getElementById('login-password').value;
    
    try {
      await login(user_id, pw);
      window.location.href = "lobby.html"; // 로그인 성공 시 로비로 이동
    } catch (error) {
      // login 함수 내부에서 이미 alert를 띄우므로 여기선 생략해도 무방합니다.
    }
  });

  // 3. 구글 로그인 및 추가 정보 기입
  document.getElementById('btn-google-login').addEventListener('click', async () => {
    const result = await loginWithGoogle();
    
    if (result && result.isNewUser) {
      tempGoogleData = result;
      document.getElementById('g-signup-email').value = result.email;
      document.getElementById('g-signup-id').value = result.email.split('@')[0];
      document.getElementById('g-signup-nickname').value = result.nickname;
      showSection('google-signup-section'); // 신규 유저는 추가 정보 창으로
    } else if (result && !result.isNewUser) {
      alert("구글 로그인 성공!");
      window.location.href = "lobby.html"; // 기존 유저는 바로 로비로 이동
    }
  });

  // 4. 일반 회원가입
  document.getElementById('btn-signup').addEventListener('click', async () => {
    const email = document.getElementById('signup-email').value;
    const pw = document.getElementById('signup-password').value;
    const id = document.getElementById('signup-id').value;
    const nick = document.getElementById('signup-nickname').value;
    const file = document.getElementById('signup-profile-file').files[0];
    
    // 결과값을 isSuccess 변수로 받아옵니다.
    const isSuccess = await signUpWithEmail(email, pw, id, nick, file);
    
    // isSuccess가 true(성공)일 때만 아래 코드를 실행합니다.
    if (isSuccess) {
      alert("회원가입이 완료되었습니다. 로그인해주세요!");
      showSection('login-section'); 
    }
  });

  // 5. 구글 회원가입 완료
  document.getElementById('btn-g-signup-complete').addEventListener('click', async () => {
    const id = document.getElementById('g-signup-id').value;
    const nick = document.getElementById('g-signup-nickname').value;
    const file = document.getElementById('g-signup-profile-file').files[0];

    await completeGoogleSignUp(tempGoogleData.uid, tempGoogleData.email, id, nick, tempGoogleData.photoURL, file);
    alert("구글 연동 가입이 완료되었습니다. 로그인해주세요!");
    showSection('login-section'); // 가입 완료 후 로그인 화면으로 전환
  });

  // 아이디/닉네임 중복 확인 (일반 가입)
  document.getElementById('btn-check-id').addEventListener('click', async () => {
    const idVal = document.getElementById('signup-id').value;
    if(!idVal) return alert("아이디를 입력하세요.");
    const isDup = await checkIdDuplicate(idVal);
    if(isDup) {
      document.getElementById('id-status').innerText = "❌ 이미 사용 중인 아이디입니다.";
      document.getElementById('id-status').style.color = "red";
      isIdValid = false;
    } else {
      document.getElementById('id-status').innerText = "✅ 사용 가능한 아이디입니다.";
      document.getElementById('id-status').style.color = "green";
      isIdValid = true;
    }
  });

  document.getElementById('btn-check-nickname').addEventListener('click', async () => {
    const nickVal = document.getElementById('signup-nickname').value;
    if(!nickVal) return alert("닉네임을 입력하세요.");
    const isDup = await checkNicknameDuplicate(nickVal);
    if(isDup) {
      document.getElementById('nickname-status').innerText = "❌ 이미 사용 중인 닉네임입니다.";
      document.getElementById('nickname-status').style.color = "red";
      isNicknameValid = false;
    } else {
      document.getElementById('nickname-status').innerText = "✅ 사용 가능한 닉네임입니다.";
      document.getElementById('nickname-status').style.color = "green";
      isNicknameValid = true;
    }
  });

  // 유저가 값을 다시 수정하면 통과 상태 초기화
  document.getElementById('signup-id').addEventListener('input', () => { isIdValid = false; document.getElementById('id-status').innerText = ""; });
  document.getElementById('signup-nickname').addEventListener('input', () => { isNicknameValid = false; document.getElementById('nickname-status').innerText = ""; });
</script>
</body>
</html>
