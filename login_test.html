<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Firebase 인증 테스트</title>
  <style>
    body { font-family: sans-serif; background-color: #f4f4f9; padding: 20px; }
    .container { max-width: 400px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .hidden { display: none; }
    .input-group { margin-bottom: 15px; }
    input { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; }
    button { width: 100%; padding: 10px; background-color: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; margin-top: 5px; }
    button:hover { background-color: #45a049; }
    .btn-secondary { background-color: #2196F3; width: auto; font-size: 12px; padding: 5px 10px; }
    .btn-google { background-color: #db4437; margin-top: 15px; }
    hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
    .toggle-link { color: #2196F3; cursor: pointer; text-align: center; display: block; font-size: 14px; margin-top: 10px; }
  </style>
</head>
<body>

<div class="container" id="main-container">
  
  <!-- 1. 로그인 화면 -->
  <div id="login-section">
    <h2>로그인</h2>
    <div class="input-group">
      <label>아이디</label>
      <input type="user_id" id="login-id" placeholder="아이디 입력">
    </div>
    <div class="input-group">
      <label>비밀번호</label>
      <input type="password" id="login-password" placeholder="비밀번호 입력">
    </div>
    <button id="btn-login">로그인</button>
    
    <button id="btn-google-login" class="btn-google">구글로 시작하기</button>
    <span class="toggle-link" id="go-to-signup">계정이 없으신가요? 회원가입</span>
  </div>

  <!-- 2. 일반 이메일 회원가입 화면 -->
  <div id="signup-section" class="hidden">
    <h2>이메일 회원가입</h2>
    <div class="input-group">
      <label>아이디</label>
      <input type="text" id="signup-id" placeholder="사용할 아이디">
      <button class="btn-secondary" id="btn-check-id">중복확인</button>
      <span id="id-status" style="font-size:12px; color:red;"></span>
    </div>
    <div class="input-group">
      <label>닉네임</label>
      <input type="text" id="signup-nickname" placeholder="사용할 닉네임">
      <button class="btn-secondary" id="btn-check-nickname">중복확인</button>
      <span id="nickname-status" style="font-size:12px; color:red;"></span>
    </div>
    <div class="input-group">
      <label>이메일</label>
      <input type="email" id="signup-email" placeholder="이메일 입력 (자동 중복검사)">
    </div>
    <div class="input-group">
      <label>비밀번호</label>
      <input type="password" id="signup-password" placeholder="8~12자 (영문, 숫자, 특수문자 포함)">
    </div>
    <div class="input-group">
      <label>프로필 사진 (선택)</label>
      <input type="file" id="signup-profile-file" accept="image/*">
    </div>
    <button id="btn-signup">회원가입 완료</button>
    <span class="toggle-link" id="go-to-login">이미 계정이 있으신가요? 로그인</span>
  </div>

  <!-- 3. 구글 신규 유저 추가 정보 입력 화면 -->
  <div id="google-signup-section" class="hidden">
    <h2>구글 회원가입 추가 정보</h2>
    <p style="font-size: 13px; color: #666;">구글 계정 연동이 완료되었습니다. 게임에서 사용할 정보를 입력해주세요.</p>
    
    <div class="input-group">
      <label>이메일</label>
      <input type="email" id="g-signup-email" disabled> <!-- 수정 불가 -->
    </div>
    <div class="input-group">
      <label>아이디</label>
      <input type="text" id="g-signup-id" placeholder="사용할 아이디">
      <button class="btn-secondary" id="btn-g-check-id">중복확인</button>
      <span id="g-id-status" style="font-size:12px; color:red;"></span>
    </div>
    <div class="input-group">
      <label>닉네임</label>
      <input type="text" id="g-signup-nickname" placeholder="사용할 닉네임">
      <button class="btn-secondary" id="btn-g-check-nickname">중복확인</button>
      <span id="g-nickname-status" style="font-size:12px; color:red;"></span>
    </div>
    <div class="input-group">
      <label>프로필 사진 변경 (선택)</label>
      <input type="file" id="g-signup-profile-file" accept="image/*">
    </div>
    <button id="btn-g-signup-complete">구글 가입 완료</button>
  </div>

</div>

<!-- 자바스크립트 연동 -->
<script type="module">
  // 만들어둔 함수들 불러오기
  import { 
    signUpWithEmail, 
    login, 
    loginWithGoogle, 
    completeGoogleSignUp, 
    checkIdDuplicate, 
    checkNicknameDuplicate 
  } from './login.js';

  // 상태 관리 변수 (중복 확인 통과 여부)
  let isIdValid = false;
  let isNicknameValid = false;

  // 구글 신규 가입 시 임시 저장용 데이터
  let tempGoogleData = null;

  // 화면 전환 함수
  const showSection = (sectionId) => {
    document.getElementById('login-section').classList.add('hidden');
    document.getElementById('signup-section').classList.add('hidden');
    document.getElementById('google-signup-section').classList.add('hidden');
    document.getElementById(sectionId).classList.remove('hidden');
  };

  // --- 화면 전환 이벤트 ---
  document.getElementById('go-to-signup').addEventListener('click', () => showSection('signup-section'));
  document.getElementById('go-to-login').addEventListener('click', () => showSection('login-section'));

  // --- 아이디/닉네임 중복 확인 (일반 가입) ---
  document.getElementById('btn-check-id').addEventListener('click', async () => {
    const idVal = document.getElementById('signup-id').value;
    if(!idVal) return alert("아이디를 입력하세요.");
    const isDup = await checkIdDuplicate(idVal);
    if(isDup) {
      document.getElementById('id-status').innerText = "❌ 이미 사용 중인 아이디입니다.";
      document.getElementById('id-status').style.color = "red";
      isIdValid = false;
    } else {
      document.getElementById('id-status').innerText = "✅ 사용 가능한 아이디입니다.";
      document.getElementById('id-status').style.color = "green";
      isIdValid = true;
    }
  });

  document.getElementById('btn-check-nickname').addEventListener('click', async () => {
    const nickVal = document.getElementById('signup-nickname').value;
    if(!nickVal) return alert("닉네임을 입력하세요.");
    const isDup = await checkNicknameDuplicate(nickVal);
    if(isDup) {
      document.getElementById('nickname-status').innerText = "❌ 이미 사용 중인 닉네임입니다.";
      document.getElementById('nickname-status').style.color = "red";
      isNicknameValid = false;
    } else {
      document.getElementById('nickname-status').innerText = "✅ 사용 가능한 닉네임입니다.";
      document.getElementById('nickname-status').style.color = "green";
      isNicknameValid = true;
    }
  });

  // 유저가 값을 다시 수정하면 통과 상태 초기화
  document.getElementById('signup-id').addEventListener('input', () => { isIdValid = false; document.getElementById('id-status').innerText = ""; });
  document.getElementById('signup-nickname').addEventListener('input', () => { isNicknameValid = false; document.getElementById('nickname-status').innerText = ""; });


  // --- 1. 일반 이메일 회원가입 실행 ---
  document.getElementById('btn-signup').addEventListener('click', async () => {
    if (!isIdValid || !isNicknameValid) {
      return alert("아이디와 닉네임 중복 확인을 모두 완료해주세요.");
    }

    const id = document.getElementById('signup-id').value;
    const nick = document.getElementById('signup-nickname').value;
    const email = document.getElementById('signup-email').value;
    const pw = document.getElementById('signup-password').value;
    const fileInput = document.getElementById('signup-profile-file').files[0];

    // 작성한 함수 실행!
    await signUpWithEmail(email, pw, id, nick, fileInput);
  });

  // --- 2. 일반 이메일 로그인 실행 ---
  document.getElementById('btn-login').addEventListener('click', async () => {
    const user_id = document.getElementById('login-id').value;
    const pw = document.getElementById('login-password').value;
    await login(user_id, pw);
  });

  // --- 3. 구글 로그인 실행 ---
  document.getElementById('btn-google-login').addEventListener('click', async () => {
    const result = await loginWithGoogle();
    
    if (result && result.isNewUser) {
      // 신규 유저라면 추가 정보 입력 화면으로 전환
      tempGoogleData = result;

      const extractedId = result.email.split('@')[0];

      document.getElementById('g-signup-email').value = result.email;
      document.getElementById('g-signup-id').value = extractedId; // ✅ 아이디 자동 입력
      document.getElementById('g-signup-nickname').value = result.nickname;
      
      // ✅ (선택) 중복 확인 안내 문구 띄우기
      // 자동 입력은 되었지만, 해당 아이디가 이미 DB에 있을 수 있으므로 중복 확인을 유도합니다.
      document.getElementById('g-id-status').innerText = "💡 중복확인을 해주세요.";
      document.getElementById('g-id-status').style.color = "#666";
      isIdValid = false;

      showSection('google-signup-section');
    } else if (result && !result.isNewUser) {
      // 기존 유저는 그대로 로그인 성공
      alert("구글 로그인 성공! (로비로 이동)");
    }
  });

  // --- 4. 구글 신규 유저 아이디/닉네임 중복 확인 ---
  document.getElementById('btn-g-check-id').addEventListener('click', async () => {
    const idVal = document.getElementById('g-signup-id').value;
    if(!idVal) return alert("아이디를 입력하세요.");
    const isDup = await checkIdDuplicate(idVal);
    if(isDup) {
      document.getElementById('g-id-status').innerText = "❌ 불가";
      isIdValid = false;
    } else {
      document.getElementById('g-id-status').innerText = "✅ 가능";
      isIdValid = true;
    }
  });

  document.getElementById('btn-g-check-nickname').addEventListener('click', async () => {
    const nickVal = document.getElementById('g-signup-nickname').value;
    if(!nickVal) return alert("닉네임을 입력하세요.");
    const isDup = await checkNicknameDuplicate(nickVal);
    if(isDup) {
      document.getElementById('g-nickname-status').innerText = "❌ 불가";
      isNicknameValid = false;
    } else {
      document.getElementById('g-nickname-status').innerText = "✅ 가능";
      isNicknameValid = true;
    }
  });

  document.getElementById('g-signup-id').addEventListener('input', () => { isIdValid = false; document.getElementById('g-id-status').innerText = ""; });
  document.getElementById('g-signup-nickname').addEventListener('input', () => { isNicknameValid = false; document.getElementById('g-nickname-status').innerText = ""; });

  // --- 5. 구글 신규 유저 최종 회원가입 실행 ---
  document.getElementById('btn-g-signup-complete').addEventListener('click', async () => {
    if (!isIdValid || !isNicknameValid) {
      return alert("아이디와 닉네임 중복 확인을 모두 완료해주세요.");
    }

    const id = document.getElementById('g-signup-id').value;
    const nick = document.getElementById('g-signup-nickname').value;
    const fileInput = document.getElementById('g-signup-profile-file').files[0];

    await completeGoogleSignUp(
      tempGoogleData.uid, 
      tempGoogleData.email, 
      id, 
      nick, 
      tempGoogleData.photoURL, 
      fileInput
    );

    alert("구글 계정 연동 및 회원가입이 완료되었습니다! 다시 로그인해주세요.");

    showSection('login-section');
  });

</script>
</body>
</html>
