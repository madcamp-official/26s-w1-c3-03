<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Master - 시작하기</title>
  <link rel="stylesheet" href="common.css">
  <link rel="stylesheet" href="auth.css">
</head>
<body>
  <main class="container">
    <div id="main-section">
      <div class="main-title-box">
        <img class="main-logo" id="mainLogo" src="/Images/logo.png" alt="로고" />
      </div>
      <div class="main-btn-group">
        <button id="nav-to-login" type="button">로그인</button>
        <button id="nav-to-guest" type="button">게스트 로그인</button>
      </div>
      <span class="main-signup-link" id="nav-to-signup">회원가입</span>
    </div>

    <div id="login-section" class="hidden">
      <h2>로그인</h2>
      <div class="input-group">
        <label for="login-id">아이디</label>
        <input type="text" id="login-id" placeholder="아이디 입력" spellcheck="false">
      </div>
      <div class="input-group">
        <label for="login-password">비밀번호</label>
        <input type="password" id="login-password" placeholder="비밀번호 입력">
      </div>
      <div class="login-btn-group">
        <button id="btn-login" class="primary-btn" type="button">로그인</button>
        <button id="btn-google-login" class="primary-btn btn-google" type="button">Google 로그인</button>
      </div>
      <span class="toggle-link nav-to-main">메인으로 돌아가기</span>
    </div>

    <div id="guest-login-section" class="hidden">
      <h2>게스트 로그인</h2>
      <div class="input-group secondary">
        <label for="guest-nickname">닉네임</label>
        <div class="input-with-btn">
          <input type="text" id="guest-nickname" placeholder="2~12자(한글, 영문, 숫자 사용 가능)" spellcheck="false">
          <button class="btn-secondary" id="btn-guest-check-nickname" type="button">중복 확인</button>
        </div>
        <span id="guest-nickname-status" class="auth-status"></span>
      </div>
      <div class="login-btn-group">
        <button id="btn-guest-login-submit" class="primary-btn" type="button">로그인</button>
      </div>
      <span class="toggle-link nav-to-main">메인으로 돌아가기</span>
    </div>

    <div id="before-signup-section" class="hidden">
      <div class="main-title-box">
        <h1>Color Master</h1>
      </div>
      <div class="main-btn-group">
        <button id="nav-to-email-signup" type="button">이메일로 가입</button>
        <button id="btn-google-signup" type="button">Google로 가입</button>
      </div>
      <span class="toggle-link nav-to-main">메인으로 돌아가기</span>
    </div>

    <div id="signup-section" class="hidden">
      <h2>이메일 회원가입</h2>
      <div class="profile-area">
        <img class="profile-image default-img" id="defaultProfileImage" src="/Images/profile.png" alt="프로필 이미지" />
        <button class="profile-action-button choice-image-button" id="choiceProfileImageButton" type="button">프로필 사진 선택</button>
        <input id="signup-profile-file" type="file" accept="image/*" hidden />
      </div>
      <div class="input-group secondary">
        <label for="signup-email">이메일</label>
        <div class="input-with-btn">
          <input type="email" id="signup-email" placeholder="이메일 입력" spellcheck="false">
          <button class="btn-secondary" id="btn-check-email" type="button">중복 확인</button>
        </div>
        <span id="email-status" class="auth-status"></span>
      </div>
      <div class="input-group secondary">
        <label for="signup-nickname">닉네임</label>
        <div class="input-with-btn">
          <input type="text" id="signup-nickname" placeholder="2~12자(한글, 영문, 숫자 사용 가능)" spellcheck="false">
          <button class="btn-secondary" id="btn-check-nickname" type="button">중복 확인</button>
        </div>
        <span id="nickname-status" class="auth-status"></span>
      </div>
      <div class="input-group secondary">
        <label for="signup-id">아이디</label>
        <div class="input-with-btn">
          <input type="text" id="signup-id" placeholder="영문, 숫자 사용 가능" spellcheck="false">
          <button class="btn-secondary" id="btn-check-id" type="button">중복 확인</button>
        </div>
        <span id="id-status" class="auth-status"></span>
      </div>
      <div class="input-group">
        <label for="signup-password">비밀번호</label>
        <input type="password" id="signup-password" placeholder="8~12자(영문, 숫자, 특수문자 포함)">
      </div>
      <div class="login-btn-group">
        <button id="btn-signup" class="primary-btn" type="button">회원가입 완료</button>
      </div>
      <span class="toggle-link nav-to-main">메인으로 돌아가기</span>
    </div>

    <div id="google-signup-section" class="hidden">
      <h2>Google 회원가입</h2>
      <div class="profile-area">
        <img class="profile-image default-img" id="g-defaultProfileImage" src="/Images/profile.png" alt="프로필 이미지" />
        <button class="profile-action-button choice-image-button" id="googleChoiceProfileImageButton" type="button">프로필 사진 선택</button>
        <input id="g-signup-profile-file" type="file" accept="image/*" hidden />
      </div>
      <div class="input-group secondary">
        <label for="g-signup-email">이메일</label>
        <div class="input-with-btn">
          <input type="email" id="g-signup-email" placeholder="이메일 입력" spellcheck="false">
          <button class="btn-secondary" id="btn-g-check-email" type="button">중복 확인</button>
        </div>
        <span id="g-email-status" class="auth-status"></span>
      </div>
      <div class="input-group secondary">
        <label for="g-signup-nickname">닉네임</label>
        <div class="input-with-btn">
          <input type="text" id="g-signup-nickname" placeholder="2~12자(한글, 영문, 숫자 사용 가능)" spellcheck="false">
          <button class="btn-secondary" id="btn-g-check-nickname" type="button">중복 확인</button>
        </div>
        <span id="g-nickname-status" class="auth-status"></span>
      </div>
      <div class="input-group secondary">
        <label for="g-signup-id">아이디</label>
        <div class="input-with-btn">
          <input type="text" id="g-signup-id" placeholder="영문, 숫자 사용 가능" spellcheck="false">
          <button class="btn-secondary" id="btn-g-check-id" type="button">중복 확인</button>
        </div>
        <span id="g-id-status" class="auth-status"></span>
      </div>
      <button id="btn-g-signup-complete" class="primary-btn" type="button">Google 가입 완료</button>
      <span class="toggle-link nav-to-main">메인으로 돌아가기</span>
    </div>

    <div class="auth-modal-layer hidden" id="authModalLayer" aria-hidden="true">
      <div class="auth-modal-backdrop" data-auth-modal-close></div>
      <div class="auth-modal" role="dialog" aria-modal="true" aria-label="Authentication notice">
        <p class="auth-modal-message" id="authModalMessage"></p>
        <button class="primary-btn auth-modal-button" id="authModalConfirm" type="button">확인</button>
      </div>
    </div>
  </main>

  <script type="module" src="auth.js"></script>
</body>
</html>
